limit_req_zone $binary_remote_addr zone=booking:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;


#     # location / {
#     #     return 301 https://$host$request_uri;
#     # }



server {
    listen 80;
    server_name seansa.ru www.seansa.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /app {
        proxy_pass http://127.0.0.1:80/frontend/master.html;
    }

    location = /book {
        proxy_pass http://127.0.0.1:80/frontend/book.html;
    }

    location = /cancel {
        proxy_pass http://127.0.0.1:80/frontend/cancel.html;
    }

    location = /reset {                                        
        proxy_pass http://127.0.0.1:80/frontend/reset.html;    
    }  

    location /frontend/ {
        root /usr/share/nginx/html;
    }

        # Защита публичного роута записи
    location ~ ^/book/ {
        limit_req zone=booking burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Защита авторизации
    location ~ ^/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}